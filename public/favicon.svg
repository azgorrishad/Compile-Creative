"<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\">\n  <rect width=\"100\" height=\"100\" fill=\"#0A0A12\"/>\n  <g transform=\"translate(20, 10)\">\n    <!-- Top diamonds -->\n    <rect x=\"8\" y=\"0\" width=\"18\" height=\"18\" transform=\"rotate(45 17 9)\" fill=\"#00E5CC\" opacity=\"0.9\"/>\n    <rect x=\"26\" y=\"0\" width=\"14\" height=\"14\" transform=\"rotate(45 33 7)\" fill=\"#EEEEF5\" opacity=\"0.4\"/>\n    <!-- Left side -->\n    <rect x=\"0\" y=\"24\" width=\"16\" height=\"16\" transform=\"rotate(45 8 32)\" fill=\"#EEEEF5\" opacity=\"0.6\"/>\n    <!-- Center C cutout -->\n    <circle cx=\"36\" cy=\"40\" r=\"10\" fill=\"#0A0A12\"/>\n    <!-- Bottom diamonds -->\n    <rect x=\"26\" y=\"52\" width=\"18\" height=\"18\" transform=\"rotate(45 35 61)\" fill=\"#EEEEF5\" opacity=\"0.5\"/>\n    <rect x=\"44\" y=\"52\" width=\"14\" height=\"14\" transform=\"rotate(45 51 59)\" fill=\"#00E5CC\" opacity=\"0.7\"/>\n    <!-- Right diamonds -->\n    <rect x=\"48\" y=\"8\" width=\"16\" height=\"16\" transform=\"rotate(45 56 16)\" fill=\"#00E5CC\" opacity=\"0.5\"/>\n    <rect x=\"48\" y=\"48\" width=\"16\" height=\"16\" transform=\"rotate(45 56 56)\" fill=\"#EEEEF5\" opacity=\"0.3\"/>\n  </g>\n</svg>\n"